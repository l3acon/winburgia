---
- name: Ensure genisoimage is installed
  ansible.builtin.package:
    name: genisoimage
    state: present
  become: true

- name: Query libvirt for current virtual machines
  community.libvirt.virt:
    command: list_vms
  register: virt_status

- name: Shut down VM if it is running
  community.libvirt.virt:
    command: destroy
    name: "{{ win_vm_name }}"
  when: win_vm_name in virt_status.list_vms
  failed_when: false

- name: Remove VM and its snapshots if defined
  ansible.builtin.command:
    cmd: "virsh undefine {{ win_vm_name }} --snapshots-metadata"
  when: win_vm_name in virt_status.list_vms

- name: Delete previous disk image
  ansible.builtin.file:
    path: "{{ win_disk_path }}"
    state: absent

- name: Create disk image
  ansible.builtin.command:
    cmd: "qemu-img create -f qcow2 {{ win_disk_path }} {{ win_vm_disk_size }}G"
    creates: "{{ win_disk_path }}"

- name: Create temporary directory for unattend files
  ansible.builtin.file:
    path: "{{ win_unattend_dir }}"
    state: directory
    mode: "0755"

- name: Template autounattend.xml
  ansible.builtin.template:
    src: autounattend.xml.j2
    dest: "{{ win_unattend_dir }}/autounattend.xml"
    mode: "0644"

- name: Create unattend ISO
  ansible.builtin.command:
    cmd: "genisoimage -o {{ win_unattend_iso_path }} -J {{ win_unattend_dir }}/"

- name: Install Windows VM
  ansible.builtin.command: >
    virt-install --connect qemu:///system
    --virt-type kvm
    --noautoconsole
    --name {{ win_vm_name }}
    --ram {{ win_vm_memory }}
    --vcpus {{ win_vm_vcpus }}
    --os-variant {{ win_vm_os_variant }}
    --disk path={{ win_disk_path }},format=qcow2,bus=sata
    --disk path={{ win_iso_path }},device=cdrom
    --disk path={{ win_unattend_iso_path }},device=cdrom
    --network bridge={{ win_vm_bridge }},model=e1000e
    --graphics {{ win_vm_graphics }}
    --boot cdrom,hd

- name: Wait for WinRM on {{ win_vm_fqdn }}
  ansible.builtin.wait_for:
    host: "{{ win_vm_fqdn }}"
    port: 5985
    timeout: 1800
    sleep: 15
  delegate_to: localhost

- name: Display VM connectivity
  ansible.builtin.debug:
    msg: "Windows VM {{ win_vm_name }} is reachable at {{ win_vm_fqdn }}:5985"

- name: Clean up temporary unattend directory
  ansible.builtin.file:
    path: "{{ win_unattend_dir }}"
    state: absent
