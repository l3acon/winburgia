---
- name: Validate snapshot name provided
  ansible.builtin.assert:
    that: snapshot_name | length > 0
    fail_msg: "snapshot_name must be provided for restore operation"

- name: Restore snapshot
  ansible.builtin.command:
    cmd: "virsh snapshot-revert {{ vm_name }} --snapshotname {{ snapshot_name }}"
  changed_when: true

- name: Display restore result
  ansible.builtin.debug:
    msg: "Restored {{ vm_name }} to snapshot: {{ snapshot_name }}"
