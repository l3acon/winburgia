---
plugin: microsoft.ad.ldap
auth_protocol: simple
tls_mode: ldaps
cert_validation: ignore
search_base: DC=lab,DC=cheeseburgia,DC=com
filter: (objectClass=computer)
attributes:
  cn: raw
  dNSHostName: raw
  operatingSystem: raw
  operatingSystemVersion: raw
compose:
  ansible_host: dNSHostName | first | default(cn | first)
groups:
  windows: true
