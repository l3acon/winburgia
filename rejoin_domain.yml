---
- name: Clean up stale AD computer objects from the DC
  hosts: WINAD
  gather_facts: false
  tasks:
    - name: Remove stale computer accounts from AD
      ansible.windows.win_shell: |
        Import-Module ActiveDirectory
        foreach ($name in @('WINMEMBER', 'WINMEMBER2', 'WINMEMBER3')) {
            $comp = Get-ADComputer -Filter "Name -eq '$name'" -ErrorAction SilentlyContinue
            if ($comp) {
                Remove-ADComputer -Identity $comp -Confirm:$false
                Write-Output "Removed stale AD object: $name"
            } else {
                Write-Output "No stale AD object for: $name"
            }
        }
      register: _cleanup

    - name: Show cleanup results
      ansible.builtin.debug:
        msg: "{{ _cleanup.stdout }}"

- name: Re-join Windows hosts to the domain
  hosts: WINMEMBER:WINMEMBER2:WINMEMBER3
  gather_facts: false
  serial: 1
  vars:
    ansible_winrm_transport: ntlm
    domain_name: lab.cheeseburgia.com
    domain_admin: "Administrator@LAB.CHEESEBURGIA.COM"
    domain_password: "{{ ansible_password }}"
    dc_ip: 172.16.0.229
  tasks:
    - name: Check current domain status
      ansible.windows.win_shell: |
        $cs = Get-WmiObject Win32_ComputerSystem
        Write-Output "PartOfDomain=$($cs.PartOfDomain) Domain=$($cs.Domain)"
      register: _status
      changed_when: false

    - name: Show status
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }}: {{ _status.stdout | trim }}"

    - name: Configure DNS to point to DC
      ansible.windows.win_shell: |
        $adapters = Get-NetAdapter | Where-Object { $_.Status -eq 'Up' }
        foreach ($adapter in $adapters) {
            $current = (Get-DnsClientServerAddress -InterfaceIndex $adapter.InterfaceIndex -AddressFamily IPv4).ServerAddresses
            Write-Output "Adapter '$($adapter.Name)' current DNS: $($current -join ', ')"
            if ('{{ dc_ip }}' -notin $current) {
                Set-DnsClientServerAddress -InterfaceIndex $adapter.InterfaceIndex -ServerAddresses @('{{ dc_ip }}')
                Write-Output "  -> Set DNS to {{ dc_ip }}"
            } else {
                Write-Output "  -> Already configured"
            }
        }
      register: _dns_config
      when: "'PartOfDomain=False' in _status.stdout"

    - name: Show DNS configuration
      ansible.builtin.debug:
        msg: "{{ _dns_config.stdout | default('skipped') }}"

    - name: Verify domain SRV records resolve
      ansible.windows.win_shell: |
        $srv = Resolve-DnsName -Name _ldap._tcp.dc._msdcs.lab.cheeseburgia.com -Type SRV -ErrorAction SilentlyContinue
        if ($srv) {
            Write-Output "SRV record found: $($srv.NameTarget) port $($srv.Port)"
        } else {
            Write-Output "SRV record NOT found - domain join will fail"
        }
      register: _srv_check
      changed_when: false
      when: "'PartOfDomain=False' in _status.stdout"

    - name: Show SRV check
      ansible.builtin.debug:
        msg: "{{ _srv_check.stdout | default('skipped') }}"

    - name: Join domain
      microsoft.ad.membership:
        dns_domain_name: "{{ domain_name }}"
        domain_admin_user: "{{ domain_admin }}"
        domain_admin_password: "{{ domain_password }}"
        state: domain
        reboot: true
      when: "'PartOfDomain=False' in _status.stdout"
      register: _join

    - name: Verify domain membership after join
      ansible.windows.win_shell: |
        $cs = Get-WmiObject Win32_ComputerSystem
        if ($cs.PartOfDomain) {
            Write-Output "JOINED: $($cs.Name) is now part of $($cs.Domain)"
            try {
                $spns = ([adsisearcher]"(&(objectCategory=computer)(cn=$env:COMPUTERNAME))").FindOne().Properties['serviceprincipalname']
                Write-Output "SPNs registered: $($spns.Count)"
                $spns | ForEach-Object { Write-Output "  $_" }
            } catch {
                Write-Output "Could not query SPNs yet"
            }
        } else {
            Write-Output "FAILED: $($cs.Name) is still in $($cs.Domain)"
        }
      register: _verify
      changed_when: false

    - name: Show verification
      ansible.builtin.debug:
        msg: "{{ _verify.stdout }}"

- name: Validate Kerberos connectivity
  hosts: WINMEMBER:WINMEMBER2:WINMEMBER3
  gather_facts: false
  tasks:
    - name: Kerberos win_ping
      ansible.windows.win_ping:

    - name: Kerberos connection confirmed
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }}: Kerberos WinRM authentication successful!"
