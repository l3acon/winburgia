---
- name: Prepare DC - fix DNS and clean stale AD objects
  hosts: WINAD
  gather_facts: false
  tasks:
    - name: Check and fix DNS SRV records
      ansible.windows.win_shell: |
        $dns_running = (Get-Service DNS -ErrorAction SilentlyContinue).Status
        Write-Output "DNS service: $dns_running"

        $srv = Resolve-DnsName -Name _ldap._tcp.dc._msdcs.lab.cheeseburgia.com -Type SRV -Server 127.0.0.1 -ErrorAction SilentlyContinue
        if ($srv) {
            Write-Output "SRV records exist: $($srv.NameTarget)"
        } else {
            Write-Output "SRV records missing - registering..."
            # Force DC to re-register all DNS records
            nltest /dsregdns
            ipconfig /registerdns
            # Wait for DNS registration
            Start-Sleep -Seconds 5
            $srv2 = Resolve-DnsName -Name _ldap._tcp.dc._msdcs.lab.cheeseburgia.com -Type SRV -Server 127.0.0.1 -ErrorAction SilentlyContinue
            if ($srv2) {
                Write-Output "SRV records now registered: $($srv2.NameTarget)"
            } else {
                Write-Output "SRV registration failed - check DNS zone config"
                # List DNS zones
                Get-DnsServerZone | Format-Table ZoneName, ZoneType, IsAutoCreated -AutoSize
            }
        }
      register: _dns_fix

    - name: Show DNS status
      ansible.builtin.debug:
        msg: "{{ _dns_fix.stdout }}"

    - name: Remove stale computer accounts from AD
      ansible.windows.win_shell: |
        Import-Module ActiveDirectory
        foreach ($name in @('WINMEMBER', 'WINMEMBER2', 'WINMEMBER3')) {
            $comp = Get-ADComputer -Filter "Name -eq '$name'" -ErrorAction SilentlyContinue
            if ($comp) {
                Remove-ADComputer -Identity $comp -Confirm:$false
                Write-Output "Removed stale AD object: $name"
            } else {
                Write-Output "No stale AD object for: $name"
            }
        }
      register: _cleanup

    - name: Show cleanup results
      ansible.builtin.debug:
        msg: "{{ _cleanup.stdout }}"

- name: Re-join Windows hosts to the domain
  hosts: WINMEMBER:WINMEMBER2:WINMEMBER3
  gather_facts: false
  serial: 1
  vars:
    ansible_winrm_transport: ntlm
    domain_name: lab.cheeseburgia.com
    domain_admin: "Administrator@LAB.CHEESEBURGIA.COM"
    domain_password: "{{ ansible_password }}"
    dc_ip: 172.16.0.229
  tasks:
    - name: Check current domain status
      ansible.windows.win_shell: |
        $cs = Get-WmiObject Win32_ComputerSystem
        Write-Output "PartOfDomain=$($cs.PartOfDomain) Domain=$($cs.Domain)"
      register: _status
      changed_when: false

    - name: Show status
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }}: {{ _status.stdout | trim }}"

    - name: Configure DNS to point to DC
      ansible.windows.win_shell: |
        $adapters = Get-NetAdapter | Where-Object { $_.Status -eq 'Up' }
        foreach ($adapter in $adapters) {
            $current = (Get-DnsClientServerAddress -InterfaceIndex $adapter.InterfaceIndex -AddressFamily IPv4).ServerAddresses
            Write-Output "Adapter '$($adapter.Name)' current DNS: $($current -join ', ')"
            if ('{{ dc_ip }}' -notin $current) {
                Set-DnsClientServerAddress -InterfaceIndex $adapter.InterfaceIndex -ServerAddresses @('{{ dc_ip }}')
                Write-Output "  -> Set DNS to {{ dc_ip }}"
            } else {
                Write-Output "  -> Already configured"
            }
        }
      register: _dns_config
      when: "'PartOfDomain=False' in _status.stdout"

    - name: Show DNS configuration
      ansible.builtin.debug:
        msg: "{{ _dns_config.stdout | default('skipped') }}"

    - name: Full connectivity and domain join diagnostics
      ansible.windows.win_shell: |
        ipconfig /flushdns | Out-Null

        # Test all ports needed for domain join
        foreach ($port in @(53, 88, 135, 389, 445, 636, 3268)) {
            $t = Test-NetConnection -ComputerName {{ dc_ip }} -Port $port -WarningAction SilentlyContinue
            Write-Output "Port $port : $($t.TcpTestSucceeded)"
        }

        # SRV resolution
        try {
            $srv = Resolve-DnsName -Name _ldap._tcp.dc._msdcs.lab.cheeseburgia.com -Type SRV -Server {{ dc_ip }} -ErrorAction Stop
            Write-Output "SRV OK: $($srv.NameTarget)"
        } catch {
            Write-Output "SRV FAIL: $_"
        }

        # Try nltest to locate DC
        Write-Output "--- nltest /dsgetdc ---"
        nltest /dsgetdc:lab.cheeseburgia.com 2>&1
      register: _diag
      changed_when: false
      when: "'PartOfDomain=False' in _status.stdout"

    - name: Show diagnostics
      ansible.builtin.debug:
        msg: "{{ _diag.stdout | default('skipped') }}"

    - name: Join domain with Add-Computer
      ansible.windows.win_shell: |
        $ErrorActionPreference = 'Stop'
        $cred = New-Object System.Management.Automation.PSCredential(
          '{{ domain_admin }}',
          (ConvertTo-SecureString '{{ domain_password }}' -AsPlainText -Force)
        )
        try {
            Add-Computer -DomainName '{{ domain_name }}' -Credential $cred -Force -Verbose *>&1
            Write-Output "SUCCESS: Domain join completed"
        } catch {
            Write-Output "FAILED: $($_.Exception.Message)"
            Write-Output "Inner: $($_.Exception.InnerException.Message)"
            throw
        }
      when: "'PartOfDomain=False' in _status.stdout"
      register: _join

    - name: Reboot after join
      ansible.windows.win_reboot:
        reboot_timeout: 600
        post_reboot_delay: 30
      when: _join is changed

    - name: Verify domain membership after join
      ansible.windows.win_shell: |
        $cs = Get-WmiObject Win32_ComputerSystem
        if ($cs.PartOfDomain) {
            Write-Output "JOINED: $($cs.Name) is now part of $($cs.Domain)"
            try {
                $spns = ([adsisearcher]"(&(objectCategory=computer)(cn=$env:COMPUTERNAME))").FindOne().Properties['serviceprincipalname']
                Write-Output "SPNs registered: $($spns.Count)"
                $spns | ForEach-Object { Write-Output "  $_" }
            } catch {
                Write-Output "Could not query SPNs yet"
            }
        } else {
            Write-Output "FAILED: $($cs.Name) is still in $($cs.Domain)"
        }
      register: _verify
      changed_when: false

    - name: Show verification
      ansible.builtin.debug:
        msg: "{{ _verify.stdout }}"

- name: Validate Kerberos connectivity
  hosts: WINMEMBER:WINMEMBER2:WINMEMBER3
  gather_facts: false
  tasks:
    - name: Kerberos win_ping
      ansible.windows.win_ping:

    - name: Kerberos connection confirmed
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }}: Kerberos WinRM authentication successful!"
