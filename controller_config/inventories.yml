---
controller_inventories:
  - name: Cheeseburgia Windows
    description: Windows hosts from Active Directory in the Cheeseburgia lab
    organization: Default
    variables:
      ansible_connection: winrm
      ansible_winrm_transport: kerberos
      ansible_winrm_server_cert_validation: ignore
      ansible_port: 5985

  - name: Cheeseburgia Hypervisor
    description: KVM hypervisor for the Cheeseburgia lab
    organization: Default

controller_inventory_sources:
  - name: Active Directory - Cheeseburgia
    description: Windows hosts discovered from Active Directory
    inventory: Cheeseburgia Windows
    source: scm
    source_project: Winburgia
    source_path: inventory.microsoft.ad.ldap.yml
    credential: Windows AD Credential
    overwrite: true
    update_on_launch: true

controller_hosts:
  - name: "{{ lookup('ansible.builtin.env', 'HYPERVISOR_HOST') }}"
    inventory: Cheeseburgia Hypervisor
    enabled: true

  - name: WINMEMBER
    inventory: Cheeseburgia Windows
    enabled: true
    variables:
      ansible_host: WINMEMBER.lab.cheeseburgia.com

  - name: WINMEMBER2
    inventory: Cheeseburgia Windows
    enabled: true
    variables:
      ansible_host: WINMEMBER2.lab.cheeseburgia.com

  - name: WINMEMBER3
    inventory: Cheeseburgia Windows
    enabled: true
    variables:
      ansible_host: WINMEMBER3.lab.cheeseburgia.com

  - name: WINREPORT
    inventory: Cheeseburgia Windows
    enabled: true
    variables:
      ansible_host: WINREPORT.lab.cheeseburgia.com
