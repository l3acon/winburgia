---
controller_workflows:
  - name: "Winburgia | Patch Windows Workflow"
    description: Snapshot VM, patch Windows, generate report, revert on failure
    organization: Default
    ask_variables_on_launch: true
    extra_vars:
      vm_targets:
        - winmember
        - winmember2
        - winmember3
    simplified_workflow_nodes:
      - identifier: snapshot
        unified_job_template: "Winburgia | Snapshot VM"
        success_nodes:
          - patch

      - identifier: patch
        unified_job_template: "Winburgia | Patch Windows"
        success_nodes:
          - provision_report_server
        failure_nodes:
          - revert

      - identifier: provision_report_server
        unified_job_template: "Winburgia | Provision Report Server"
        success_nodes:
          - deploy_report

      - identifier: deploy_report
        unified_job_template: "Winburgia | Deploy Patch Report"

      - identifier: revert
        unified_job_template: "Winburgia | Revert Snapshot"

  - name: "Winburgia | STIG Compliance Workflow"
    description: Apply STIG hardening, provision report server, serve compliance report
    organization: Default
    ask_variables_on_launch: true
    simplified_workflow_nodes:
      - identifier: apply_stig
        unified_job_template: "Winburgia | Apply STIG"
        limit: "WINMEMBER:WINMEMBER2:WINMEMBER3"
        success_nodes:
          - provision_report_server

      - identifier: provision_report_server
        unified_job_template: "Winburgia | Provision Report Server"
        success_nodes:
          - deploy_stig_report

      - identifier: deploy_stig_report
        unified_job_template: "Winburgia | Deploy STIG Report"
