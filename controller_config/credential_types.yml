---
controller_credential_types:
  - name: Microsoft AD LDAP
    description: Credential for Microsoft Active Directory LDAP inventory plugin
    kind: cloud
    inputs:
      fields:
        - type: string
          id: ad_server
          label: AD Server
        - type: string
          id: ad_username
          label: AD Username
        - type: string
          id: ad_password
          label: AD Password
          secret: true
      required:
        - ad_server
        - ad_username
        - ad_password
    injectors:
      env:
        MICROSOFT_AD_LDAP_SERVER: !unsafe "{{ ad_server }}"
        MICROSOFT_AD_LDAP_USERNAME: !unsafe "{{ ad_username }}"
        MICROSOFT_AD_LDAP_PASSWORD: !unsafe "{{ ad_password }}"

  - name: Kerberos Configuration
    description: Generates krb5.conf for Kerberos WinRM authentication
    kind: cloud
    inputs:
      fields:
        - type: string
          id: default_realm
          label: Default Realm
        - type: string
          id: kdc
          label: KDC
          help_text: Optional KDC, use only if KDC DNS lookup not working
      required:
        - default_realm
    injectors:
      env:
        KRB5_CONFIG: !unsafe "{{ tower.filename }}"
      file:
        template: !unsafe |-
          [libdefaults]
          default_realm = {{ default_realm | upper }}
          dns_canonicalize_hostname = fallback
          dns_lookup_kdc = {% if kdc %}false{% else %}true{% endif %}
          dns_lookup_realm = true
          forwardable = true
          rdns = false
          [realms]
          {{ default_realm | upper }} = {
            {% if kdc %}kdc = {{ kdc }}{% endif %}
          }
          [domain_realm]
            {{ default_realm | lower }} = {{ default_realm | upper }}
      extra_vars:
        ansible_winrm_kinit_env_vars:
          - KRB5_CONFIG

  - name: Windows Deploy Password
    description: Injects the Windows admin password for VM provisioning
    kind: cloud
    inputs:
      fields:
        - type: string
          id: win_admin_password
          label: Windows Admin Password
          secret: true
      required:
        - win_admin_password
    injectors:
      env:
        WIN_ADMIN_PASSWORD: !unsafe "{{ win_admin_password }}"
