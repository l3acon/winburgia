---
- name: Test Kerberos WinRM connection
  hosts: all
  gather_facts: false
  tasks:
    - name: Check ansible_user
      ansible.builtin.debug:
        msg: "ansible_user={{ ansible_user | default('not set') }}"
      delegate_to: localhost
      run_once: true

    - name: Pre-kinit for Kerberos
      ansible.builtin.shell:
        cmd: "echo '{{ ansible_password }}' | KRB5_CONFIG={{ lookup('ansible.builtin.env', 'KRB5_CONFIG') }} kinit {{ ansible_user }} 2>&1"
      delegate_to: localhost
      run_once: true
      register: _kinit
      changed_when: false
      no_log: false

    - name: Verify ticket
      ansible.builtin.shell:
        cmd: "KRB5_CONFIG={{ lookup('ansible.builtin.env', 'KRB5_CONFIG') }} klist 2>&1"
      delegate_to: localhost
      run_once: true
      register: _klist
      changed_when: false

    - name: Show ticket
      ansible.builtin.debug:
        msg: "{{ _klist.stdout }}"
      delegate_to: localhost
      run_once: true

    - name: Get AD computer SPNs
      ansible.windows.win_shell: |
        $comp = [adsisearcher]"(&(objectCategory=computer)(cn=$env:COMPUTERNAME))"
        $result = $comp.FindOne()
        $spns = $result.Properties['serviceprincipalname']
        if ($spns) {
            $spns | ForEach-Object { Write-Output $_ }
        } else {
            Write-Output "NO SPNs FOUND"
        }
      vars:
        ansible_winrm_transport: ntlm
      register: _spns

    - name: Show SPNs
      ansible.builtin.debug:
        msg: "{{ _spns.stdout }}"

    - name: Register WSMAN SPN if needed
      ansible.windows.win_shell: |
        setspn -S HTTP/$env:COMPUTERNAME $env:COMPUTERNAME
        setspn -S HTTP/$env:COMPUTERNAME.lab.cheeseburgia.com $env:COMPUTERNAME
      vars:
        ansible_winrm_transport: ntlm
      when: "'HTTP/' not in _spns.stdout"
      register: _spn_reg

    - name: Show SPN registration result
      ansible.builtin.debug:
        msg: "{{ _spn_reg.stdout | default('skipped - SPNs already registered') }}"

    - name: Test WinRM Kerberos
      ansible.windows.win_ping:
