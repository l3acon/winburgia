---
- name: Check WinRM config via NTLM
  hosts: all
  gather_facts: false
  vars:
    ansible_winrm_transport: ntlm
  tasks:
    - name: Get WinRM auth config
      ansible.windows.win_shell: |
        winrm get winrm/config/service/auth
      register: _auth

    - name: Show WinRM auth config
      ansible.builtin.debug:
        msg: "{{ _auth.stdout }}"

    - name: Get WinRM listeners
      ansible.windows.win_shell: |
        winrm enumerate winrm/config/listener
      register: _listeners

    - name: Show WinRM listeners
      ansible.builtin.debug:
        msg: "{{ _listeners.stdout }}"

- name: Test Kerberos WinRM connection
  hosts: all
  gather_facts: false
  tasks:
    - name: Kerberos win_ping
      ansible.windows.win_ping:
