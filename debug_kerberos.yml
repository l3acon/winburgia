---
- name: Test Kerberos WinRM connection
  hosts: all
  gather_facts: false
  tasks:
    - name: Check ansible_user
      ansible.builtin.debug:
        msg: "ansible_user={{ ansible_user | default('not set') }}"
      delegate_to: localhost
      run_once: true

    - name: Pre-kinit for Kerberos
      ansible.builtin.shell:
        cmd: "echo '{{ ansible_password }}' | KRB5_CONFIG={{ lookup('ansible.builtin.env', 'KRB5_CONFIG') }} kinit {{ ansible_user }} 2>&1"
      delegate_to: localhost
      run_once: true
      register: _kinit
      changed_when: false
      no_log: false

    - name: Verify ticket
      ansible.builtin.shell:
        cmd: "KRB5_CONFIG={{ lookup('ansible.builtin.env', 'KRB5_CONFIG') }} klist 2>&1"
      delegate_to: localhost
      run_once: true
      register: _klist
      changed_when: false

    - name: Show ticket
      ansible.builtin.debug:
        msg: "{{ _klist.stdout }}"
      delegate_to: localhost
      run_once: true

    - name: Get SPNs and test via NTLM
      ansible.windows.win_shell: |
        setspn -L $env:COMPUTERNAME
        Write-Output "---"
        Get-WSManInstance -ResourceURI winrm/config/service/auth
      vars:
        ansible_winrm_transport: ntlm
      register: _winconfig

    - name: Show SPNs and auth config
      ansible.builtin.debug:
        msg: "{{ _winconfig.stdout }}"

    - name: Test WinRM Kerberos
      ansible.windows.win_ping:
