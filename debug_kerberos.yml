---
- name: Test Kerberos WinRM connection
  hosts: all
  gather_facts: false
  tasks:
    - name: Check ansible_user
      ansible.builtin.debug:
        msg: "ansible_user={{ ansible_user | default('not set') }}"
      delegate_to: localhost
      run_once: true

    - name: Pre-kinit for Kerberos
      ansible.builtin.shell:
        cmd: "echo '{{ ansible_password }}' | KRB5_CONFIG={{ lookup('ansible.builtin.env', 'KRB5_CONFIG') }} kinit {{ ansible_user }} 2>&1"
      delegate_to: localhost
      run_once: true
      register: _kinit
      changed_when: false
      no_log: false

    - name: Verify ticket
      ansible.builtin.shell:
        cmd: "KRB5_CONFIG={{ lookup('ansible.builtin.env', 'KRB5_CONFIG') }} klist 2>&1"
      delegate_to: localhost
      run_once: true
      register: _klist
      changed_when: false

    - name: Show ticket
      ansible.builtin.debug:
        msg: "{{ _klist.stdout }}"
      delegate_to: localhost
      run_once: true

    - name: Check domain trust and repair if needed
      ansible.windows.win_shell: |
        Write-Output "=== Domain Trust ==="
        Test-ComputerSecureChannel -Verbose 2>&1 | ForEach-Object { Write-Output $_ }
        Write-Output "=== Repair Trust ==="
        try {
            $cred = New-Object System.Management.Automation.PSCredential("Administrator@LAB.CHEESEBURGIA.COM", (ConvertTo-SecureString "{{ ansible_password }}" -AsPlainText -Force))
            Test-ComputerSecureChannel -Repair -Credential $cred -Verbose 2>&1 | ForEach-Object { Write-Output $_ }
        } catch {
            Write-Output "Repair failed: $_"
        }
        Write-Output "=== SPNs After Repair ==="
        $comp = [adsisearcher]"(&(objectCategory=computer)(cn=$env:COMPUTERNAME))"
        $result = $comp.FindOne()
        if ($result) {
            $spns = $result.Properties['serviceprincipalname']
            if ($spns) { $spns | ForEach-Object { Write-Output $_ } }
            else { Write-Output "Still no SPNs" }
        } else {
            Write-Output "Cannot query AD"
        }
      vars:
        ansible_winrm_transport: ntlm
      register: _trust
      ignore_errors: true

    - name: Show trust repair results
      ansible.builtin.debug:
        msg: "{{ _trust.stdout }}"

    - name: Test WinRM Kerberos
      ansible.windows.win_ping:
