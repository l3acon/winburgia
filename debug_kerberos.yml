---
- name: Test Kerberos WinRM connection
  hosts: all
  gather_facts: false
  tasks:
    - name: Check ansible_user
      ansible.builtin.debug:
        msg: "ansible_user={{ ansible_user | default('not set') }}"
      delegate_to: localhost
      run_once: true

    - name: Pre-kinit for Kerberos
      ansible.builtin.shell:
        cmd: "echo '{{ ansible_password }}' | KRB5_CONFIG={{ lookup('ansible.builtin.env', 'KRB5_CONFIG') }} kinit {{ ansible_user }} 2>&1"
      delegate_to: localhost
      run_once: true
      register: _kinit
      changed_when: false
      no_log: false

    - name: Verify ticket
      ansible.builtin.shell:
        cmd: "KRB5_CONFIG={{ lookup('ansible.builtin.env', 'KRB5_CONFIG') }} klist 2>&1"
      delegate_to: localhost
      run_once: true
      register: _klist
      changed_when: false

    - name: Show ticket
      ansible.builtin.debug:
        msg: "{{ _klist.stdout }}"
      delegate_to: localhost
      run_once: true

    - name: Test pywinrm with negotiate transport
      ansible.builtin.shell:
        cmd: |
          KRB5_CONFIG={{ lookup('ansible.builtin.env', 'KRB5_CONFIG') }} KRB5CCNAME=/tmp/krb5cc_0 python3.12 -c "
          import traceback, winrm
          try:
              s = winrm.Session('http://{{ ansible_host }}:5985/wsman', auth=('{{ ansible_user }}@LAB.CHEESEBURGIA.COM', '{{ ansible_password }}'), transport='ntlm')
              r = s.run_cmd('setspn', ['-L', '{{ inventory_hostname }}\$'])
              print(f'NTLM OK - SPNs:')
              print(r.std_out.decode())
          except Exception as e:
              print(f'NTLM FAIL: {e}')
          try:
              s = winrm.Session('http://{{ ansible_host }}:5985/wsman', auth=('{{ ansible_user }}@LAB.CHEESEBURGIA.COM', '{{ ansible_password }}'), transport='kerberos', service='WSMAN')
              r = s.run_cmd('hostname')
              print(f'KERBEROS(WSMAN) OK: {r.std_out.decode().strip()}')
          except Exception as e:
              print(f'KERBEROS(WSMAN) FAIL: {e}')
          try:
              s = winrm.Session('http://{{ ansible_host }}:5985/wsman', auth=('{{ ansible_user }}@LAB.CHEESEBURGIA.COM', '{{ ansible_password }}'), transport='kerberos', service='HTTP')
              r = s.run_cmd('hostname')
              print(f'KERBEROS(HTTP) OK: {r.std_out.decode().strip()}')
          except Exception as e:
              print(f'KERBEROS(HTTP) FAIL: {e}')
          "
      delegate_to: localhost
      run_once: true
      register: _test
      ignore_errors: true
      changed_when: false
      no_log: false

    - name: Show results
      ansible.builtin.debug:
        msg: "{{ _test.stdout }}"
      delegate_to: localhost
      run_once: true
