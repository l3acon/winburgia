---
- name: Test Kerberos WinRM connection
  hosts: all
  gather_facts: false
  tasks:
    - name: Check ansible_user
      ansible.builtin.debug:
        msg: "ansible_user={{ ansible_user | default('not set') }}"
      delegate_to: localhost
      run_once: true

    - name: Pre-kinit for Kerberos
      ansible.builtin.shell:
        cmd: "echo '{{ ansible_password }}' | KRB5_CONFIG={{ lookup('ansible.builtin.env', 'KRB5_CONFIG') }} kinit {{ ansible_user }} 2>&1"
      delegate_to: localhost
      run_once: true
      register: _kinit
      changed_when: false
      no_log: false

    - name: Verify ticket
      ansible.builtin.shell:
        cmd: "KRB5_CONFIG={{ lookup('ansible.builtin.env', 'KRB5_CONFIG') }} klist 2>&1"
      delegate_to: localhost
      run_once: true
      register: _klist
      changed_when: false

    - name: Show ticket
      ansible.builtin.debug:
        msg: "{{ _klist.stdout }}"
      delegate_to: localhost
      run_once: true

    - name: Test pywinrm Kerberos directly
      ansible.builtin.shell:
        cmd: |
          KRB5_CONFIG={{ lookup('ansible.builtin.env', 'KRB5_CONFIG') }} python3.12 -c "
          import os, traceback
          os.environ['KRB5CCNAME'] = '/tmp/krb5cc_0'
          import winrm
          try:
              s = winrm.Session('http://{{ ansible_host }}:5985/wsman', auth=('{{ ansible_user }}@LAB.CHEESEBURGIA.COM', '{{ ansible_password }}'), transport='kerberos')
              r = s.run_cmd('hostname')
              print(f'SUCCESS: {r.std_out.decode().strip()}')
          except Exception as e:
              traceback.print_exc()
          "
      delegate_to: localhost
      run_once: true
      register: _pywinrm_test
      ignore_errors: true
      changed_when: false
      no_log: false

    - name: Show pywinrm result
      ansible.builtin.debug:
        msg: "stdout={{ _pywinrm_test.stdout }} stderr={{ _pywinrm_test.stderr }}"
      delegate_to: localhost
      run_once: true

    - name: Test WinRM with kerberos
      ansible.windows.win_ping:

    - name: Kerberos connection successful
      ansible.builtin.debug:
        msg: "Kerberos WinRM connection to {{ inventory_hostname }} succeeded!"
