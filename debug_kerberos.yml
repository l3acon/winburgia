---
- name: Test Kerberos WinRM connection
  hosts: all
  gather_facts: false
  tasks:
    - name: Check ansible_user
      ansible.builtin.debug:
        msg: "ansible_user={{ ansible_user | default('not set') }}"
      delegate_to: localhost
      run_once: true

    - name: Pre-kinit for Kerberos
      ansible.builtin.shell:
        cmd: "echo '{{ ansible_password }}' | KRB5_CONFIG={{ lookup('ansible.builtin.env', 'KRB5_CONFIG') }} kinit {{ ansible_user }} 2>&1"
      delegate_to: localhost
      run_once: true
      register: _kinit
      changed_when: false
      no_log: false

    - name: Verify ticket
      ansible.builtin.shell:
        cmd: "KRB5_CONFIG={{ lookup('ansible.builtin.env', 'KRB5_CONFIG') }} klist 2>&1"
      delegate_to: localhost
      run_once: true
      register: _klist
      changed_when: false

    - name: Show ticket
      ansible.builtin.debug:
        msg: "{{ _klist.stdout }}"
      delegate_to: localhost
      run_once: true

    - name: Re-join domain if not joined
      ansible.windows.win_shell: |
        $isDomain = (Get-WmiObject Win32_ComputerSystem).PartOfDomain
        if (-not $isDomain) {
            Write-Output "Not domain-joined. Re-joining..."
            $cred = New-Object System.Management.Automation.PSCredential("Administrator@LAB.CHEESEBURGIA.COM", (ConvertTo-SecureString "{{ ansible_password }}" -AsPlainText -Force))
            Add-Computer -DomainName "lab.cheeseburgia.com" -Credential $cred -Force
            Write-Output "Domain join initiated. Reboot required."
        } else {
            Write-Output "Already domain-joined"
        }
      vars:
        ansible_winrm_transport: ntlm
      register: _join
      ignore_errors: true

    - name: Show domain join result
      ansible.builtin.debug:
        msg: "{{ _join.stdout }}"

    - name: Reboot if domain join happened
      ansible.windows.win_reboot:
        reboot_timeout: 300
      vars:
        ansible_winrm_transport: ntlm
      when: "'Re-joining' in _join.stdout"

    - name: Test WinRM Kerberos after domain join
      ansible.windows.win_ping:
