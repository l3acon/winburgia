---
- name: Test Kerberos WinRM connection
  hosts: all
  gather_facts: false
  tasks:
    - name: Check ansible_user
      ansible.builtin.debug:
        msg: "ansible_user={{ ansible_user | default('not set') }}"
      delegate_to: localhost
      run_once: true

    - name: Pre-kinit for Kerberos
      ansible.builtin.shell:
        cmd: "echo '{{ ansible_password }}' | KRB5_CONFIG={{ lookup('ansible.builtin.env', 'KRB5_CONFIG') }} kinit {{ ansible_user }} 2>&1"
      delegate_to: localhost
      run_once: true
      register: _kinit
      changed_when: false
      no_log: false

    - name: Verify ticket
      ansible.builtin.shell:
        cmd: "KRB5_CONFIG={{ lookup('ansible.builtin.env', 'KRB5_CONFIG') }} klist 2>&1"
      delegate_to: localhost
      run_once: true
      register: _klist
      changed_when: false

    - name: Show ticket
      ansible.builtin.debug:
        msg: "{{ _klist.stdout }}"
      delegate_to: localhost
      run_once: true

    - name: Test WinRM with kerberos
      ansible.windows.win_ping:

    - name: Kerberos connection successful
      ansible.builtin.debug:
        msg: "Kerberos WinRM connection to {{ inventory_hostname }} succeeded!"
