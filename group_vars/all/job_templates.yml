---
controller_templates:
  - name: "Winburgia | Snapshot VM"
    description: Create a pre-patching snapshot of a VM on the KVM hypervisor
    organization: Default
    project: Winburgia
    playbook: snapshot.yml
    inventory: Cheeseburgia Hypervisor
    credentials:
      - Hypervisor Credential
    become_enabled: true
    ask_variables_on_launch: true
    extra_vars:
      vm_targets:
        - winmember
      operation: snapshot
      snapshot_name: ""

  - name: "Winburgia | Patch Windows"
    description: Install critical and security updates on Windows hosts
    organization: Default
    project: Winburgia
    playbook: patch_windows.yml
    inventory: Cheeseburgia Windows
    limit: WINMEMBER
    credentials:
      - Windows Machine Credential
    ask_variables_on_launch: true
    ask_limit_on_launch: true

  - name: "Winburgia | Revert Snapshot"
    description: Revert a VM to a previously created snapshot
    organization: Default
    project: Winburgia
    playbook: revert_snapshot.yml
    inventory: Cheeseburgia Hypervisor
    credentials:
      - Hypervisor Credential
    become_enabled: true
    ask_variables_on_launch: true
    extra_vars:
      vm_targets:
        - winmember
      snapshot_name: ""

  - name: "Winburgia | Provision Report Server"
    description: Provision the winreport VM if it does not already exist
    organization: Default
    project: Winburgia
    playbook: provision_report_server.yml
    inventory: Cheeseburgia Hypervisor
    execution_environment: Winburgia EE
    credentials:
      - Hypervisor Credential
      - Windows Deploy Credential
    become_enabled: true
    ask_variables_on_launch: true
    extra_vars:
      report_vm_name: winreport
      win_iso_path: /virt/images/SERVER_EVAL_x64FRE_en-us.iso

  - name: "Winburgia | Deploy Patch Report"
    description: Deploy IIS and serve an HTML patch report
    organization: Default
    project: Winburgia
    playbook: deploy_patch_report.yml
    inventory: Cheeseburgia Windows
    limit: WINREPORT
    execution_environment: Winburgia EE
    credentials:
      - Windows Machine Credential
    ask_variables_on_launch: true
    ask_limit_on_launch: true

  - name: "Winburgia | Apply STIG"
    description: Apply DISA STIG hardening controls to a Windows Server
    organization: Default
    project: Winburgia
    playbook: apply_stig.yml
    inventory: Cheeseburgia Windows
    execution_environment: Winburgia EE
    credentials:
      - Windows Machine Credential
    ask_variables_on_launch: true
    ask_limit_on_launch: true
    survey_enabled: true
    survey_spec:
      name: STIG Configuration
      description: Options for STIG hardening
      spec:
        - question_name: Report Format
          variable: windows_manage_stig_report_format
          type: multiplechoice
          required: false
          default: html
          choices: |-
            json
            html
            yaml
          question_description: Format for the compliance report
        - question_name: Organization Name
          variable: windows_manage_stig_organization
          type: text
          required: false
          default: Cheeseburgia
          question_description: Organization name for audit trail
        - question_name: Compliance Threshold (%)
          variable: windows_manage_stig_compliance_threshold
          type: integer
          required: false
          default: 95
          min: 0
          max: 100
          question_description: Minimum compliance percentage required
        - question_name: Fail on Non-Compliance
          variable: windows_manage_stig_fail_on_non_compliance
          type: multiplechoice
          required: false
          default: "false"
          choices: |-
            true
            false
          question_description: Fail the job if compliance threshold is not met
    extra_vars:
      windows_manage_stig_generate_report: true

  - name: "Winburgia | Deploy Windows VM"
    description: Deploy a new Windows VM on the KVM hypervisor
    organization: Default
    project: Winburgia
    playbook: deploy_winvm.yml
    inventory: Cheeseburgia Hypervisor
    execution_environment: Winburgia EE
    credentials:
      - Hypervisor Credential
      - Windows Deploy Credential
    become_enabled: true
    survey_enabled: true
    survey_spec:
      name: Deploy Windows VM Survey
      description: Parameters for the new Windows VM
      spec:
        - question_name: VM Name
          variable: win_vm_name
          type: text
          required: true
          default: ""
          question_description: Name for the new Windows VM (e.g. winweb01)
        - question_name: vCPUs
          variable: win_vm_vcpus
          type: integer
          required: false
          default: 4
          min: 1
          max: 16
          question_description: Number of virtual CPUs
        - question_name: Memory (MB)
          variable: win_vm_memory
          type: integer
          required: false
          default: 16384
          min: 2048
          max: 65536
          question_description: Memory in megabytes
        - question_name: Disk Size (GB)
          variable: win_vm_disk_size
          type: integer
          required: false
          default: 60
          min: 20
          max: 500
          question_description: Disk size in gigabytes
    extra_vars:
      win_iso_path: /virt/images/SERVER_EVAL_x64FRE_en-us.iso
