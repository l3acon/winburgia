---
controller_credentials:
  - name: Winburgia SCM Credential
    description: Source control credential for the winburgia project
    organization: Default
    credential_type: Source Control
    inputs:
      username: ""
      password: ""

  - name: Windows AD Credential
    description: Active Directory credential for winad.lab.cheeseburgia.com
    organization: Default
    credential_type: Microsoft AD LDAP
    inputs:
      ad_server: "{{ lookup('ansible.builtin.env', 'AD_SERVER') }}"
      ad_username: "{{ lookup('ansible.builtin.env', 'AD_USERNAME') }}"
      ad_password: "{{ lookup('ansible.builtin.env', 'AD_PASSWORD') }}"

  - name: Hypervisor Credential
    description: SSH credential for the KVM hypervisor
    organization: Default
    credential_type: Machine
    inputs:
      username: "{{ lookup('ansible.builtin.env', 'HYPERVISOR_USER') }}"
      ssh_key_data: "{{ lookup('ansible.builtin.env', 'HYPERVISOR_SSH_KEY') }}"
      become_method: sudo

  - name: Windows Machine Credential
    description: WinRM credential for Windows hosts in Cheeseburgia lab
    organization: Default
    credential_type: Machine
    inputs:
      username: "{{ lookup('ansible.builtin.env', 'WIN_USERNAME') }}"
      password: "{{ lookup('ansible.builtin.env', 'WIN_PASSWORD') }}"
