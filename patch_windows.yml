---
- name: Patch Windows hosts
  hosts: all
  gather_facts: true

  roles:
    - role: windows_manage_updates
      vars:
        windows_manage_updates_state: installed
        windows_manage_updates_reboot_server: true
        windows_manage_updates_categories:
          - CriticalUpdates
          - SecurityUpdates

  post_tasks:
    - name: Build per-host patch report data
      ansible.builtin.set_fact:
        _host_patch_report:
          host: "{{ inventory_hostname }}"
          fqdn: "{{ ansible_fqdn | default(inventory_hostname) }}"
          patched_at: "{{ ansible_date_time.iso8601 }}"
          reboot_required: "{{ windows_manage_updates_output.reboot_required | default(false) }}"
          installed_count: "{{ windows_manage_updates_output.installed_update_count | default(0) }}"
          found_count: "{{ windows_manage_updates_output.found_update_count | default(0) }}"
          categories: "{{ windows_manage_updates_categories }}"
          updates: "{{ windows_manage_updates_output.updates | default({}) | dict2items | map(attribute='value') | list }}"

    - name: Aggregate patch reports from all hosts
      ansible.builtin.set_fact:
        patch_reports: "{{ ansible_play_hosts_all | map('extract', hostvars, '_host_patch_report') | list }}"
      run_once: true

    - name: Export patch results as workflow artifact
      ansible.builtin.set_stats:
        data:
          patch_reports: "{{ patch_reports }}"
        per_host: false
      run_once: true
